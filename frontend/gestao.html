<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão — Mais Equilibrium</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --azul:#1860A8;--azul-d:#15406E;--azul-l:#3E86D6;--aqua:#54C0CC;--ambar:#F0B43C;--ambar-d:#BD8420;--coral:#E45460;
  --ink:#16293c;--muted:#6b7f90;--muted2:#92a4b3;--line:#e4edf5;--mist:#F1F7FC;--bg:#eef4fa;
  --ok:#1E8449;--okbg:#E7F6ED;--risk:#C0392B;--riskbg:#FBEAEB;--warn:#B7791F;--warnbg:#FCF3E2;
  --sb-w:248px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Quicksand',sans-serif}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cddbe8;border-radius:6px}

.app{display:flex;min-height:100vh}

/* ====== SIDEBAR ====== */
.sidebar{width:var(--sb-w);background:#fff;border-right:1px solid var(--line);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:60;transition:transform .25s}
.sb-brand{position:relative;overflow:hidden;padding:22px 20px;background:linear-gradient(135deg,var(--azul-d),var(--azul));color:#fff}
.sb-brand .cvbg{position:absolute;inset:0;opacity:.5;pointer-events:none}
.sb-brand .cvbg .cv{position:absolute;animation:spin var(--sp,12s) linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sb-brand .row{position:relative;display:flex;align-items:center;gap:11px;z-index:2}
.sb-brand .nm{font-family:'Quicksand';font-weight:700;font-size:17px;line-height:1.1}
.sb-brand .nm span{opacity:.85;font-weight:600}
.sb-brand .tag{position:relative;z-index:2;display:inline-block;margin-top:10px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:rgba(255,255,255,.18);padding:4px 11px;border-radius:20px;font-weight:700}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto}
.sb-nav .grp{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);font-weight:700;padding:14px 12px 6px}
.sb-nav button{display:flex;align-items:center;gap:11px;width:100%;border:none;background:none;padding:11px 13px;border-radius:12px;font-family:'Quicksand';font-weight:600;font-size:14.5px;color:var(--muted);cursor:pointer;transition:.15s;margin-bottom:2px;position:relative}
.sb-nav button .ico{font-size:17px;width:22px;text-align:center}
.sb-nav button:hover{background:var(--mist);color:var(--azul)}
.sb-nav button.on{background:linear-gradient(90deg,rgba(24,96,168,.12),rgba(24,96,168,.04));color:var(--azul)}
.sb-nav button.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:4px;background:linear-gradient(var(--azul),var(--ambar))}
.sb-nav button .badge{margin-left:auto;font-size:11px;font-weight:700;background:var(--coral);color:#fff;border-radius:20px;padding:1px 8px}
.sb-foot{padding:14px;border-top:1px solid var(--line)}
.sb-foot .vinfo{font-size:11px;color:var(--muted2);text-align:center;margin-top:8px}

/* ====== MAIN ====== */
.main{flex:1;margin-left:var(--sb-w);min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:0 28px;height:66px;display:flex;align-items:center;gap:16px}
.topbar .crumb{font-size:13px;color:var(--muted)}
.topbar .crumb b{color:var(--ink);font-family:'Quicksand';font-size:16px}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}
.hamb{display:none;border:none;background:none;font-size:22px;cursor:pointer;color:var(--azul)}
.userchip{display:flex;align-items:center;gap:10px;font-size:13.5px}
.userchip .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--azul-d),var(--azul));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Quicksand';font-weight:700;font-size:14px}
.userchip .nm{font-weight:600}.userchip .rl{font-size:11.5px;color:var(--muted)}
.btn-out{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 13px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Quicksand';transition:.15s}
.btn-out:hover{background:var(--riskbg);color:var(--risk);border-color:var(--risk)}
.content{padding:28px;flex:1;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec-h{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.sec-h h1{font-size:26px;color:var(--azul-d);letter-spacing:-.3px}
.sec-h p{color:var(--muted);font-size:14px;margin-top:3px}

/* ====== KPI CARDS ====== */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.kpi{background:#fff;border-radius:18px;padding:20px;border:1px solid var(--line);position:relative;overflow:hidden;transition:.2s}
.kpi:hover{transform:translateY(-4px);box-shadow:0 18px 38px rgba(21,64,110,.12)}
.kpi .chip{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin-bottom:14px}
.kpi.c1 .chip{background:linear-gradient(135deg,var(--azul),var(--azul-l))}
.kpi.c2 .chip{background:linear-gradient(135deg,#1E8449,#27AE60)}
.kpi.c3 .chip{background:linear-gradient(135deg,var(--ambar-d),var(--ambar))}
.kpi.c4 .chip{background:linear-gradient(135deg,var(--coral),#F07882)}
.kpi .v{font-family:'Quicksand';font-weight:700;font-size:30px;color:var(--azul-d);line-height:1}
.kpi .l{font-size:13px;color:var(--muted);margin-top:6px}
.kpi .cvmini{position:absolute;right:-18px;bottom:-18px;width:92px;height:92px;opacity:.06}

/* ====== CARDS / GRID ====== */
.grid{display:grid;gap:18px;margin-top:18px}
.g-2-1{grid-template-columns:1.6fr 1fr}
.g-1-1{grid-template-columns:1fr 1fr}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px}
.card .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.card h3{font-size:16px;color:var(--azul-d)}
.card .sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.tag-soft{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--mist);color:var(--azul)}

/* ====== DONUT ====== */
.donut-wrap{display:flex;align-items:center;gap:22px}
.donut{position:relative;width:150px;height:150px;flex-shrink:0}
.donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .ctr .n{font-family:'Quicksand';font-weight:700;font-size:26px;color:var(--azul-d)}
.donut .ctr .t{font-size:11px;color:var(--muted)}
.legend{flex:1;display:flex;flex-direction:column;gap:11px}
.legend .it{display:flex;align-items:center;gap:10px;font-size:13.5px}
.legend .it .dot{width:11px;height:11px;border-radius:4px}
.legend .it b{margin-left:auto;font-family:'Quicksand';color:var(--azul-d)}
.legend .it span{color:var(--muted);font-size:12px;margin-left:4px}

/* ====== BARS ====== */
.barline{margin-bottom:14px}
.barline .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.barline .top b{color:var(--ink)}.barline .top span{color:var(--muted);font-size:12px}
.barline .track{height:11px;background:var(--mist);border-radius:7px;overflow:hidden}
.barline .track i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--azul),var(--ambar));transition:width .6s cubic-bezier(.2,.8,.2,1)}

/* ====== LISTAS / ATENÇÃO ====== */
.attn{display:flex;flex-direction:column;gap:10px}
.attn .it{display:flex;align-items:center;gap:12px;padding:12px;border-radius:13px;background:var(--mist);transition:.15s}
.attn .it:hover{background:#e8f1fa}
.attn .it .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.attn .it.warn .ic{background:var(--warnbg);color:var(--warn)}
.attn .it.risk .ic{background:var(--riskbg);color:var(--risk)}
.attn .it .tx{flex:1;min-width:0}
.attn .it .tx b{font-size:14px;display:block}.attn .it .tx small{color:var(--muted);font-size:12px}
.attn .it .val{font-family:'Quicksand';font-weight:700;color:var(--azul-d);font-size:14px}

/* ====== TABELAS ====== */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 14px;flex:1;min-width:220px;transition:.15s}
.search:focus-within{border-color:var(--azul);box-shadow:0 0 0 3px rgba(24,96,168,.1)}
.search input{border:none;outline:none;font-family:'Inter';font-size:14px;width:100%;background:none}
.filt{display:flex;gap:6px}
.filt button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Quicksand';transition:.15s}
.filt button.on{background:var(--azul);color:#fff;border-color:var(--azul)}
.tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:#fff;color:var(--muted);font-family:'Quicksand';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:14px 16px;border-bottom:2px solid var(--line)}
tbody td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px}
tbody tr:last-child td{border-bottom:none}
tbody tr.clickable{cursor:pointer;transition:.12s}
tbody tr.clickable:hover{background:var(--mist)}
.who{display:flex;align-items:center;gap:11px}
.who .a{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-family:'Quicksand';font-weight:700;flex-shrink:0}
.who small{display:block;color:var(--muted);font-size:12px}
.pill{font-size:11.5px;padding:4px 11px;border-radius:20px;font-weight:600;white-space:nowrap}
.pill.ind{background:#E1F5EE;color:#0F6E56}.pill.fam{background:#E6F1FB;color:#185FA5}.pill.gran{background:#FBF1DA;color:var(--ambar-d)}
.pill.gestor{background:#EEEDFE;color:#5b50c9}.pill.financeiro{background:#E1F5EE;color:#0F6E56}.pill.recepcao{background:#E6F1FB;color:#185FA5}
.stt{font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.stt .d{width:8px;height:8px;border-radius:50%}
.stt.ok{color:var(--ok)}.stt.ok .d{background:var(--ok)}
.stt.pend{color:var(--warn)}.stt.pend .d{background:var(--ambar)}
.stt.canc{color:var(--risk)}.stt.canc .d{background:var(--risk)}
.chev{color:var(--muted2);font-size:18px}

/* agrupamento cartões */
.arrow{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;color:var(--azul);transition:transform .2s;font-size:11px;margin-right:6px;border-radius:6px;background:var(--mist)}
.arrow.open{transform:rotate(90deg)}
.arrow.none{opacity:0;pointer-events:none}
.resumo{display:inline-block;margin-left:9px;font-size:11px;color:var(--azul);background:#E6F1FB;padding:2px 9px;border-radius:11px;font-weight:600;vertical-align:middle}
.dep-row{background:#fafcfe}.dep-row.hidden{display:none}
.dep-row td{font-size:13px}
.dep-row td:first-child{padding-left:48px;color:var(--muted);position:relative}
.dep-row td:first-child::before{content:"";position:absolute;left:28px;top:-6px;height:24px;width:12px;border-left:2px solid #cdddec;border-bottom:2px solid #cdddec;border-bottom-left-radius:6px}

/* ====== DRAWER (perfil) ====== */
.drawer-bg{position:fixed;inset:0;background:rgba(21,64,110,.4);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.25s;z-index:90}
.drawer-bg.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:94vw;background:var(--bg);box-shadow:-20px 0 60px rgba(8,30,55,.3);transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);z-index:91;overflow-y:auto}
.drawer.show{transform:translateX(0)}
.dr-head{background:linear-gradient(135deg,var(--azul-d),var(--azul));color:#fff;padding:24px;position:relative;overflow:hidden}
.dr-head .cvbg{position:absolute;inset:0;opacity:.5}
.dr-head .cvbg .cv{position:absolute;animation:spin 14s linear infinite}
.dr-head .x{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:18px;z-index:3}
.dr-head .who2{position:relative;z-index:2;display:flex;align-items:center;gap:14px}
.dr-head .who2 .a{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-family:'Quicksand';font-weight:700;font-size:20px}
.dr-head .who2 .nm{font-family:'Quicksand';font-weight:700;font-size:20px}
.dr-head .who2 small{opacity:.85;font-size:13px}
.dr-body{padding:20px}
.dr-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.dr-stat{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;text-align:center}
.dr-stat .v{font-family:'Quicksand';font-weight:700;font-size:19px;color:var(--azul-d)}
.dr-stat .l{font-size:11px;color:var(--muted);margin-top:2px}
.dr-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.dr-card h4{font-size:13px;color:var(--azul);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.dr-li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.dr-li:last-child{border-bottom:none}
.dr-li .mini{width:30px;height:30px;border-radius:8px;background:var(--mist);display:flex;align-items:center;justify-content:center;font-size:14px}
.dr-li .g{flex:1;min-width:0}.dr-li .g b{display:block;font-size:13.5px}.dr-li .g small{color:var(--muted);font-size:11.5px}
.dr-li .r{text-align:right;font-size:12.5px}
.dr-eco{color:var(--ok);font-weight:700;font-family:'Quicksand'}

/* ====== EQUIPE (form inline) ====== */
.eq-grid{display:grid;grid-template-columns:0.78fr 1.6fr;gap:18px;align-items:start}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;font-size:14px;font-family:'Inter';transition:.15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(24,96,168,.1)}
.roles{display:flex;gap:8px}
.role-opt{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:11px 6px;text-align:center;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted);transition:.15s}
.role-opt.on{border-color:var(--azul);background:var(--mist);color:var(--azul)}
.btn-full{font-family:'Quicksand';font-weight:600;border:none;border-radius:12px;padding:13px 18px;font-size:14px;cursor:pointer;width:100%;background:var(--azul);color:#fff;transition:.18s;margin-top:6px}
.btn-full:hover{background:var(--azul-d)}.btn-full:disabled{opacity:.6;cursor:not-allowed}
.msg{font-size:13.5px;border-radius:11px;padding:12px 14px;margin-top:14px;display:none}
.msg.err{background:var(--riskbg);color:var(--risk);display:block}
.msg.ok{background:var(--okbg);color:var(--ok);display:block}
.cred{background:#FFF7E6;border:1px solid var(--ambar);border-radius:12px;padding:14px;margin-top:14px;display:none}
.cred.show{display:block}
.cred .l{font-size:12px;color:var(--ambar-d);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.cred .v{font-family:'Quicksand';font-weight:700;font-size:18px;color:var(--azul-d);margin-top:4px;word-break:break-all}
.cred .copy{margin-top:10px;border:1px solid var(--ambar);background:#fff;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--ambar-d);cursor:pointer}
.rowacts{display:flex;gap:6px;justify-content:flex-end}
#equipeBody td{padding:11px 13px}
.act{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Quicksand'}
.act.toggle{color:var(--ambar-d)}.act.toggle:hover{background:#FFF7E6}
.act.del{color:var(--risk)}.act.del:hover{background:var(--riskbg)}
.act:disabled{opacity:.4;cursor:not-allowed}
.tag-me{font-size:11px;color:var(--muted);background:var(--mist);padding:3px 8px;border-radius:10px}
.modal{position:fixed;inset:0;background:rgba(21,64,110,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal .box{background:#fff;border-radius:18px;padding:28px;max-width:380px;width:90%;text-align:center;box-shadow:0 30px 70px rgba(8,30,55,.4)}
.modal .box h3{font-size:18px;color:var(--azul-d);margin-bottom:8px}
.modal .box p{font-size:14px;color:var(--muted);margin-bottom:20px}
.modal .acts{display:flex;gap:10px}
.modal .acts button{flex:1;border-radius:11px;padding:12px;font-family:'Quicksand';font-weight:600;font-size:14px;cursor:pointer;border:none}
.modal .cancel{background:var(--mist);color:var(--muted)}
.modal .ok{background:var(--risk);color:#fff}
@media(max-width:820px){.eq-grid{grid-template-columns:1fr}}

.empty{text-align:center;color:var(--muted);font-size:14px;padding:36px}
.loading{text-align:center;color:var(--muted);font-size:14px;padding:60px}
.loading .cv-spin{width:44px;height:44px;margin:0 auto 14px;animation:spin 2s linear infinite}

@media(max-width:1080px){.kpis{grid-template-columns:1fr 1fr}.g-2-1,.g-1-1{grid-template-columns:1fr}}
@media(max-width:820px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.hamb{display:block}.content{padding:18px}
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute"><defs>
<g id="blade"><path d="M 13.2,-3.8 L 2.2,-3.8 Q 0,-3.8 0,-5.7 L 0,-46.6 Q 0,-48.5 1.9,-48.5 Q 3.9,-48.5 5.5,-46.6 L 24.4,-20.1 Q 25.2,-14 22.3,-8.4 Q 21,-6 19.4,-5.8 L 13.2,-3.8 Z"/></g>
<!-- catavento azul e laranja (assinatura da marca) -->
<g id="cv-al"><use href="#blade" fill="#1860A8"/><use href="#blade" fill="#F0B43C" transform="rotate(90)"/><use href="#blade" fill="#1860A8" transform="rotate(180)"/><use href="#blade" fill="#F0B43C" transform="rotate(270)"/></g>
<g id="cv-white"><use href="#blade" fill="#fff"/><use href="#blade" fill="#fff" transform="rotate(90)"/><use href="#blade" fill="#fff" transform="rotate(180)"/><use href="#blade" fill="#fff" transform="rotate(270)"/></g>
</defs></svg>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="cvbg" id="sbCv"></div>
      <div class="row">
        <svg width="34" height="34" viewBox="-55 -55 110 110"><use href="#cv-white"/></svg>
        <div class="nm">Mais Equilibrium</div>
      </div>
      <span class="tag">Painel de Gestão</span>
    </div>
    <nav class="sb-nav" id="sbNav">
      <div class="grp">Operação</div>
      <button class="on" data-sec="geral"><span class="ico">📊</span> Visão geral</button>
      <button data-sec="assin"><span class="ico">👥</span> Assinantes</button>
      <button data-sec="cart"><span class="ico">💳</span> Cartões</button>
      <div class="grp">Negócio</div>
      <button data-sec="fin"><span class="ico">💰</span> Financeiro <span class="badge" id="bgFin" style="display:none"></span></button>
      <button data-sec="uso"><span class="ico">🩺</span> Uso & Benefícios</button>
      <div class="grp">Administração</div>
      <button data-sec="equipe"><span class="ico">⚙️</span> Equipe</button>
    </nav>
    <div class="sb-foot">
      <div class="vinfo">Mais Equilibrium · v2</div>

  </aside>

  <!-- MAIN -->
  <div class="main">

      <button class="hamb" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

      <div class="right">

<div class="modal" id="modalEq"><div class="box">

</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = window.maisClient;
const money = (n)=>"R$ "+Math.round(Number(n||0)).toLocaleString("pt-BR");
const ini = (n)=>(n||"?").split(" ").filter(Boolean).slice(0,2).map(s=>s[0]).join("").toUpperCase();
const cap = (s)=>s?s.charAt(0).toUpperCase()+s.slice(1):"";
const planClass=(s)=>s==="ind"?"ind":s==="gran"?"gran":"fam";
const planSlugNome=(n)=>/gran/i.test(n)?"gran":/individual/i.test(n)?"ind":"fam";
const stClass=(s)=>s==="ativo"?"ok":s==="cancelado"?"canc":"pend";
const labelPapel={gestor:"Gestor",financeiro:"Financeiro",recepcao:"Recepção"};
const D={};

/* ---- guarda ---- */
async function guard(){
  const {data}=await sb.auth.getSession();
  if(!data.session){location.href="login.html";return null;}
  const uid=data.session.user.id;
  tokenEq=data.session.access_token; meuId=uid;
  const {data:eq}=await sb.from("equipe").select("nome,papel,ativo").eq("auth_user_id",uid).maybeSingle();
  if(!eq||!eq.ativo||!(eq.papel==="gestor"||eq.papel==="financeiro")){
    alert("Acesso restrito à equipe de gestão.");await sb.auth.signOut();location.href="login.html";return null;
  }
  return {...eq,uid};
}
async function sair(){await sb.auth.signOut();location.href="login.html";}

/* ---- carga ---- */
async function carregar(){
  const [k,mix,assin,cart,uso,fat,usoCard]=await Promise.all([
    sb.from("vw_kpis_gestao").select("*").maybeSingle(),
    sb.from("vw_mix_planos").select("*"),
    sb.from("vw_assinantes_lista").select("*").order("data_adesao",{ascending:false}),
    sb.from("vw_cartoes_lista").select("*").order("numero_conta"),
    sb.from("vw_servicos_uso").select("*"),
    sb.from("vw_faturas_abertas").select("*"),
    sb.from("vw_uso_cartao").select("*"),
  ]);
  D.kpis=k.data||{};D.mix=mix.data||[];D.assin=assin.data||[];D.cart=cart.data||[];
  D.uso=uso.data||[];D.fat=fat.data||[];D.usoCard=usoCard.data||[];
}

/* ================= DONUT ================= */
function donut(items,total,centerN,centerT){
  const R=58,C=2*Math.PI*R; let off=0;
  const segs=items.filter(i=>i.val>0).map(i=>{
    const frac=total>0?i.val/total:0; const len=frac*C;
    const s=`<circle r="${R}" cx="75" cy="75" fill="none" stroke="${i.cor}" stroke-width="20"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 75 75)"
      stroke-linecap="butt"/>`; off+=len; return s;
  }).join("");
  return `<div class="donut"><svg width="150" height="150" viewBox="0 0 150 150">
    <circle r="58" cx="75" cy="75" fill="none" stroke="#eef4fa" stroke-width="20"/>${segs}</svg>
    <div class="ctr"><div class="n">${centerN}</div><div class="t">${centerT}</div></div></div>`;
}

/* ================= SEÇÕES ================= */
function secGeral(){
  const k=D.kpis;
  const totAtivos=D.mix.reduce((s,m)=>s+Number(m.ativos||0),0);
  const dn=donut(D.mix.map(m=>({val:Number(m.ativos),cor:m.cor_hex})),totAtivos,totAtivos,"contas ativas");
  const leg=D.mix.map(m=>`<div class="it"><span class="dot" style="background:${m.cor_hex}"></span>${m.plano}<b>${m.ativos}</b><span>${m.pct||0}%</span></div>`).join("");
  // atenção: pendentes/inadimplentes
  const pend=D.assin.filter(a=>a.status!=="ativo");
  const attn=pend.length?pend.slice(0,5).map(a=>`<div class="it ${a.status==="cancelado"?"risk":"warn"}"><div class="ic">${a.status==="cancelado"?"✕":"⏳"}</div>
    <div class="tx"><b>${a.assinante}</b><small>${a.numero_conta} · ${cap(a.status)}</small></div>
    <div class="val">${money(a.economia_total)}</div></div>`).join(""):'<div class="empty" style="padding:18px">Tudo em dia. 🎉</div>';
  // próximas cobranças
  const fat=D.fat.slice(0,5).map(f=>`<div class="it ${f.vencida?"risk":"warn"}"><div class="ic">${f.vencida?"🔴":"📅"}</div>
    <div class="tx"><b>${f.assinante}</b><small>vence ${f.vencimento} · ${f.numero_conta}</small></div>
    <div class="val">${money(f.valor)}</div></div>`).join("")||'<div class="empty" style="padding:18px">Sem faturas em aberto.</div>';

  return `
  <div class="sec-h"><div><h1>Visão geral</h1><p>O pulso do programa Mais Equilibrium em tempo real</p></div></div>
  <div class="kpis">
    <div class="kpi c1"><div class="chip">👥</div><div class="v">${k.assinantes_ativos||0}</div><div class="l">Assinantes ativos</div><svg class="cvmini" viewBox="-55 -55 110 110"><use href="#cv-al"/></svg></div>
    <div class="kpi c2"><div class="chip">💵</div><div class="v">${money(k.mrr)}</div><div class="l">Receita recorrente / mês</div><svg class="cvmini" viewBox="-55 -55 110 110"><use href="#cv-al"/></svg></div>
    <div class="kpi c3"><div class="chip">💳</div><div class="v">${k.cartoes_ativos||0}</div><div class="l">Cartões ativos</div><svg class="cvmini" viewBox="-55 -55 110 110"><use href="#cv-al"/></svg></div>
    <div class="kpi c4"><div class="chip">⏳</div><div class="v">${k.inadimplentes||0}</div><div class="l">Pendentes / inadimplentes</div><svg class="cvmini" viewBox="-55 -55 110 110"><use href="#cv-al"/></svg></div>
  </div>
  <div class="grid g-2-1">
    <div class="card"><div class="ch"><h3>Economia gerada para a base</h3><span class="tag-soft">prova de valor</span></div>
      <div class="sub">Quanto o programa já devolveu em desconto aos clientes</div>
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
        <div><div style="font-family:'Quicksand';font-weight:700;font-size:44px;color:var(--ok);line-height:1">${money(k.economia_gerada_total)}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px">em ${k.total_atendimentos||0} atendimento(s)</div></div>
        <div style="flex:1;min-width:180px">
          <div class="barline"><div class="top"><b>Receita do programa (MRR)</b><span>${money(k.mrr)}</span></div><div class="track"><i style="width:100%"></i></div></div>
          <div class="barline"><div class="top"><b>Economia devolvida</b><span>${money(k.economia_gerada_total)}</span></div><div class="track"><i style="width:${Math.min(100,Math.round((Number(k.economia_gerada_total)/Math.max(1,Number(k.mrr)))*100))}%;background:linear-gradient(90deg,#1E8449,#27AE60)"></i></div></div>
        </div>
      </div>
    </div>
    <div class="card"><div class="ch"><h3>Mix de planos</h3></div><div class="sub">Distribuição da base ativa</div>
      <div class="donut-wrap">${dn}<div class="legend">${leg||'<div class="empty">Sem dados</div>'}</div></div>
    </div>
  </div>
  <div class="grid g-1-1">
    <div class="card"><div class="ch"><h3>Precisa de atenção</h3><span class="tag-soft">${pend.length}</span></div><div class="sub">Contas pendentes, inadimplentes ou canceladas</div><div class="attn">${attn}</div></div>
    <div class="card"><div class="ch"><h3>Próximas cobranças</h3><span class="tag-soft">${D.fat.length}</span></div><div class="sub">Faturas em aberto ordenadas por vencimento</div><div class="attn">${fat}</div></div>
  </div>`;
}

function secAssin(){
  const rows=D.assin.map(a=>`<tr class="clickable" onclick="abrirPerfil('${a.numero_conta}')">
    <td><div class="who"><div class="a" style="background:${a.plano_cor}">${ini(a.assinante)}</div><div>${a.assinante}<small>${a.cpf||""}</small></div></div></td>
    <td><span class="pill ${planClass(a.plano_slug)}">${a.plano_nome}</span></td>
    <td>${a.dependentes}</td><td>${a.numero_conta}</td><td>${a.proxima_cobranca||"—"}</td>
    <td class="dr-eco">${money(a.economia_total)}</td>
    <td><span class="stt ${stClass(a.status)}"><span class="d"></span>${cap(a.status)}</span></td>
    <td><span class="chev">›</span></td></tr>`).join("");
  return `
  <div class="sec-h"><div><h1>Assinantes</h1><p>${D.assin.length} conta(s) · clique para ver o perfil completo</p></div></div>
  <div class="toolbar"><div class="search">🔍 <input id="bAssin" placeholder="Buscar por nome, CPF ou conta..." oninput="fAssin()"></div>
    <div class="filt" id="fltAssin"><button class="on" data-f="todos">Todos</button><button data-f="ativo">Ativos</button><button data-f="pendente">Pendentes</button></div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Assinante</th><th>Plano</th><th>Dep.</th><th>Conta</th><th>Próx. cobrança</th><th>Economia</th><th>Status</th><th></th></tr></thead>
  <tbody id="assinBody">${rows||'<tr><td colspan="8" class="empty">Nenhum assinante ainda.</td></tr>'}</tbody></table></div>`;
}
let fltAssinVal="todos";
function fAssin(){
  const q=(document.getElementById("bAssin").value||"").toLowerCase();
  let f=D.assin.filter(a=>(a.assinante||"").toLowerCase().includes(q)||(a.cpf||"").includes(q)||(a.numero_conta||"").toLowerCase().includes(q));
  if(fltAssinVal!=="todos")f=f.filter(a=>fltAssinVal==="ativo"?a.status==="ativo":a.status!=="ativo");
  document.getElementById("assinBody").innerHTML=f.map(a=>`<tr class="clickable" onclick="abrirPerfil('${a.numero_conta}')">
    <td><div class="who"><div class="a" style="background:${a.plano_cor}">${ini(a.assinante)}</div><div>${a.assinante}<small>${a.cpf||""}</small></div></div></td>
    <td><span class="pill ${planClass(a.plano_slug)}">${a.plano_nome}</span></td><td>${a.dependentes}</td><td>${a.numero_conta}</td><td>${a.proxima_cobranca||"—"}</td>
    <td class="dr-eco">${money(a.economia_total)}</td><td><span class="stt ${stClass(a.status)}"><span class="d"></span>${cap(a.status)}</span></td><td><span class="chev">›</span></td></tr>`).join("")||'<tr><td colspan="8" class="empty">Nada encontrado.</td></tr>';
}

/* ---- drawer perfil ---- */
function abrirPerfil(conta){
  const a=D.assin.find(x=>x.numero_conta===conta); if(!a)return;
  const cartoes=D.cart.filter(c=>c.numero_conta===conta);
  const faturas=D.fat.filter(f=>f.numero_conta===conta);
  const usos=D.usoCard.filter(u=>u.numero_cartao&&u.numero_cartao.startsWith(conta));
  const cartHtml=cartoes.map(c=>`<div class="dr-li"><div class="mini">${c.is_titular||c.papel==="Titular"?"⭐":"👤"}</div>
    <div class="g"><b>${c.titular_cartao}</b><small>${c.numero} · ${c.papel}</small></div>
    <div class="r"><span class="stt ${c.cartao_status==="ativo"&&c.adesao_status==="ativo"?"ok":"pend"}"><span class="d"></span>${c.cartao_status==="bloqueado"?"Bloq.":cap(c.adesao_status)}</span></div></div>`).join("")||'<div class="empty" style="padding:14px">—</div>';
  const usoHtml=usos.length?usos.slice(0,8).map(u=>`<div class="dr-li"><div class="mini">${u.icone||"🩺"}</div>
    <div class="g"><b>${u.servico}</b><small>${u.paciente} · ${u.data_uso}</small></div>
    <div class="r dr-eco">− ${money(u.economia)}</div></div>`).join(""):'<div class="empty" style="padding:14px">Sem atendimentos ainda.</div>';
  const fatHtml=faturas.length?faturas.map(f=>`<div class="dr-li"><div class="mini">${f.vencida?"🔴":"📅"}</div>
    <div class="g"><b>${money(f.valor)}</b><small>vence ${f.vencimento}</small></div>
    <div class="r"><span class="stt ${f.vencida?"canc":"pend"}"><span class="d"></span>${f.vencida?"Vencida":"Em aberto"}</span></div></div>`).join(""):'<div class="empty" style="padding:14px">Sem faturas em aberto. 🎉</div>';
  document.getElementById("drawer").innerHTML=`
    <div class="dr-head"><div class="cvbg" id="drCv"></div>
      <button class="x" onclick="fecharDrawer()">✕</button>
      <div class="who2"><div class="a">${ini(a.assinante)}</div><div><div class="nm">${a.assinante}</div><small>${a.numero_conta} · CPF ${a.cpf||"—"}</small></div></div>
    </div>
    <div class="dr-body">
      <div class="dr-stats">
        <div class="dr-stat"><div class="v">${a.plano_nome}</div><div class="l">Plano</div></div>
        <div class="dr-stat"><div class="v">${1+Number(a.dependentes||0)}</div><div class="l">Cartões</div></div>
        <div class="dr-stat"><div class="v" style="color:var(--ok)">${money(a.economia_total)}</div><div class="l">Economia</div></div>
      </div>
      <div class="dr-card"><h4>Cartões da família</h4>${cartHtml}</div>
      <div class="dr-card"><h4>Faturas</h4>${fatHtml}</div>
      <div class="dr-card"><h4>Histórico de uso</h4>${usoHtml}</div>
      <div class="dr-card"><h4>Contrato</h4>
        <div class="dr-li"><div class="g"><small>Adesão</small><b>${a.data_adesao||"—"}</b></div><div class="g"><small>Fidelidade até</small><b>${a.fidelidade_ate||"—"}</b></div></div>
        <div class="dr-li"><div class="g"><small>Status</small><b><span class="stt ${stClass(a.status)}"><span class="d"></span>${cap(a.status)}</span></b></div><div class="g"><small>Próx. cobrança</small><b>${a.proxima_cobranca||"—"}</b></div></div>
      </div>
    </div>`;
  plantarCv("drCv",6,.5);
  document.getElementById("drawerBg").classList.add("show");
  document.getElementById("drawer").classList.add("show");
}
function fecharDrawer(){document.getElementById("drawerBg").classList.remove("show");document.getElementById("drawer").classList.remove("show");}

/* ---- cartões agrupados ---- */
function agrupar(lista){const map={},ordem=[],v={};lista.forEach(c=>{const k=c.numero_conta;if(!map[k]){map[k]={conta:k,titular:null,deps:[],plano_slug:c.plano_slug,plano_nome:c.plano_nome};}if(c.is_titular||c.papel==="Titular")map[k].titular=c;else map[k].deps.push(c);if(!v[k]){v[k]=1;ordem.push(k);}});return ordem.map(k=>map[k]);}
function lStatus(cs,as){const ok=cs==="ativo"&&as==="ativo";return `<span class="stt ${cs==="bloqueado"?"pend":ok?"ok":"pend"}"><span class="d"></span>${cs==="bloqueado"?"Bloqueado":cap(as)}</span>`;}
function secCart(){
  const grupos=agrupar(D.cart);
  return `<div class="sec-h"><div><h1>Cartões</h1><p>${grupos.length} conta(s) · ${D.cart.length} cartão(ões) emitido(s)</p></div></div>
  <div class="toolbar"><div class="search">🔍 <input id="bCart" placeholder="Buscar por nome ou nº do cartão..." oninput="fCart()"></div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Nº do cartão</th><th>Titular / membro</th><th>Papel</th><th>Conta (titular)</th><th>Plano</th><th>Status</th></tr></thead>
  <tbody id="cartBody">${bodyCart(grupos)}</tbody></table></div>`;
}
function bodyCart(grupos){return grupos.map((g,i)=>{
  const t=g.titular||g.deps[0];const nDep=g.deps.length;const total=(g.titular?1:0)+nDep;const temDep=nDep>0;
  const resumo=temDep?`<span class="resumo">+${nDep} dependente${nDep>1?"s":""} · ${total} cartões</span>`:"";
  const cab=`<tr class="conta-row" ${temDep?`onclick="toggleConta(${i})" style="cursor:pointer"`:""}><td><span class="arrow ${temDep?"":"none"}" id="arr-${i}">▶</span><b>${t?t.numero:g.conta}</b></td><td>${t?t.titular_cartao:"—"}${resumo}</td><td>Titular</td><td>${t?t.conta_titular:"—"}</td><td><span class="pill ${planClass(g.plano_slug)}">${g.plano_nome}</span></td><td>${t?lStatus(t.cartao_status,t.adesao_status):""}</td></tr>`;
  const filhos=g.deps.map(d=>`<tr class="dep-row dep-of-${i} hidden"><td>${d.numero}</td><td>${d.titular_cartao}</td><td>${d.papel}</td><td></td><td><span class="pill ${planClass(d.plano_slug)}">${d.plano_nome}</span></td><td>${lStatus(d.cartao_status,d.adesao_status)}</td></tr>`).join("");
  return cab+filhos;}).join("")||'<tr><td colspan="6" class="empty">Nenhum cartão emitido.</td></tr>';}
function toggleConta(i){const a=document.getElementById("arr-"+i);if(a)a.classList.toggle("open");document.querySelectorAll(".dep-of-"+i).forEach(r=>r.classList.toggle("hidden"));}
function fCart(){const q=(document.getElementById("bCart").value||"").toLowerCase();const body=document.getElementById("cartBody");if(!q){body.innerHTML=bodyCart(agrupar(D.cart));return;}const f=D.cart.filter(c=>(c.titular_cartao||"").toLowerCase().includes(q)||(c.numero||"").toLowerCase().includes(q));body.innerHTML=f.map(c=>`<tr><td><b>${c.numero}</b></td><td>${c.titular_cartao}</td><td>${c.papel}</td><td>${c.conta_titular}</td><td><span class="pill ${planClass(c.plano_slug)}">${c.plano_nome}</span></td><td>${lStatus(c.cartao_status,c.adesao_status)}</td></tr>`).join("")||'<tr><td colspan="6" class="empty">Nada encontrado.</td></tr>';}

function secFin(){
  const k=D.kpis;const totalAberto=D.fat.reduce((s,f)=>s+Number(f.valor||0),0);const vencidas=D.fat.filter(f=>f.vencida).length;
  // receita por plano (a partir de assinantes ativos)
  const porPlano={};D.assin.filter(a=>a.status==="ativo").forEach(a=>{porPlano[a.plano_nome]=(porPlano[a.plano_nome]||0)+1;});
  const precos={Individual:59,Familiar:99,"Gran Família":119};
  const recRows=Object.keys(porPlano).map(p=>{const rec=(precos[p]||0)*porPlano[p];const pct=k.mrr>0?Math.round(100*rec/Number(k.mrr)):0;return `<div class="barline"><div class="top"><b>${p}</b><span>${money(rec)} · ${porPlano[p]} ativo(s)</span></div><div class="track"><i style="width:${pct}%"></i></div></div>`;}).join("")||'<div class="empty">Sem receita ativa.</div>';
  const rows=D.fat.map(f=>`<tr><td>${f.assinante}</td><td>${f.numero_conta}</td><td><span class="pill ${planClass(planSlugNome(f.plano_nome))}">${f.plano_nome}</span></td><td>${f.competencia}</td><td>${f.vencimento}</td><td>${money(f.valor)}</td><td><span class="stt ${f.vencida?"canc":"pend"}"><span class="d"></span>${f.vencida?"Vencida":"Em aberto"}</span></td></tr>`).join("");
  return `<div class="sec-h"><div><h1>Financeiro</h1><p>Receita, projeções e cobranças</p></div></div>
  <div class="kpis">
    <div class="kpi c2"><div class="chip">💵</div><div class="v">${money(k.mrr)}</div><div class="l">MRR · receita recorrente</div></div>
    <div class="kpi c1"><div class="chip">📅</div><div class="v">${money(Number(k.mrr||0)*12)}</div><div class="l">Projeção anual</div></div>
    <div class="kpi c3"><div class="chip">⏳</div><div class="v">${money(totalAberto)}</div><div class="l">A receber (em aberto)</div></div>
    <div class="kpi c4"><div class="chip">🔴</div><div class="v">${vencidas}</div><div class="l">Faturas vencidas</div></div>
  </div>
  <div class="grid g-2-1">
    <div class="card"><div class="ch"><h3>Faturas em aberto</h3><span class="tag-soft">${D.fat.length}</span></div><div class="sub">Ordenadas por vencimento</div>
      <div class="tbl-wrap" style="border:none"><table><thead><tr><th>Assinante</th><th>Conta</th><th>Plano</th><th>Comp.</th><th>Venc.</th><th>Valor</th><th>Status</th></tr></thead><tbody>${rows||'<tr><td colspan="7" class="empty">Nenhuma fatura em aberto. 🎉</td></tr>'}</tbody></table></div></div>
    <div class="card"><div class="ch"><h3>Receita por plano</h3></div><div class="sub">Composição do MRR</div>${recRows}</div>
  </div>`;
}

function secUso(){
  const usados=D.uso.filter(u=>u.volume>0);const totalVol=usados.reduce((s,u)=>s+Number(u.volume),0)||1;
  const totalEco=D.uso.reduce((s,u)=>s+Number(u.economia_gerada||0),0);
  const totalRec=D.uso.reduce((s,u)=>s+Number(u.receita_clinica||0),0);
  const bars=usados.sort((a,b)=>b.volume-a.volume).map(u=>`<div class="barline"><div class="top"><b>${u.servico}</b><span>${u.volume} atend. · ${money(u.economia_gerada)} eco.</span></div><div class="track"><i style="width:${Math.round(100*u.volume/totalVol)}%"></i></div></div>`).join("")||'<div class="empty">Nenhum uso registrado ainda.</div>';
  return `<div class="sec-h"><div><h1>Uso &amp; Benefícios</h1><p>O que a base usa com o cartão</p></div></div>
  <div class="kpis">
    <div class="kpi c1"><div class="chip">🩺</div><div class="v">${D.kpis.total_atendimentos||0}</div><div class="l">Atendimentos com cartão</div></div>
    <div class="kpi c2"><div class="chip">💸</div><div class="v">${money(totalEco)}</div><div class="l">Economia gerada</div></div>
    <div class="kpi c3"><div class="chip">🏥</div><div class="v">${money(totalRec)}</div><div class="l">Receita clínica (c/ cartão)</div></div>
    <div class="kpi c4"><div class="chip">📊</div><div class="v">${usados.length}</div><div class="l">Serviços utilizados</div></div>
  </div>
  <div class="card" style="margin-top:18px"><div class="ch"><h3>Serviços mais usados</h3></div><div class="sub">Volume de atendimentos por serviço</div>${bars}</div>`;
}

/* ================= EQUIPE (inline) ================= */
const FN_EQUIPE = window.MAIS_CONFIG.url + "/functions/v1/gerir-equipe";
const corPapel={gestor:"#5b50c9",financeiro:"#0F6E56",recepcao:"#185FA5"};
let papelSel="recepcao", tokenEq=null, meuId=null;

function secEquipe(){
  return `<div class="sec-h"><div><h1>Equipe</h1><p>Cadastre e gerencie quem tem acesso ao sistema</p></div></div>
  <div class="eq-grid">
    <div class="card">
      <div class="ch"><h3>Novo profissional</h3></div>
      <div class="sub">Você cria o acesso; a pessoa completa o perfil e troca a senha no 1º acesso.</div>
      <div class="field"><label>Nome completo</label><input id="f_nome" placeholder="Nome do profissional"></div>
      <div class="field"><label>E-mail (será o login)</label><input id="f_email" type="email" placeholder="profissional@email.com"></div>
      <div class="field"><label>Função no sistema</label>
        <div class="roles" id="roles">
          <div class="role-opt ${papelSel==='recepcao'?'on':''}" data-r="recepcao">🏥 Recepção</div>
          <div class="role-opt ${papelSel==='financeiro'?'on':''}" data-r="financeiro">💰 Financeiro</div>
          <div class="role-opt ${papelSel==='gestor'?'on':''}" data-r="gestor">⚙️ Gestor</div>
        </div>
      </div>
      <button class="btn-full" id="btnCriar" onclick="criarMembro()">Criar acesso</button>
      <div class="msg" id="msgEq"></div>
      <div class="cred" id="cred"><div class="l">Senha provisória — repasse ao profissional</div><div class="v" id="credSenha">—</div><button class="copy" onclick="copiarSenha()">📋 Copiar senha</button></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:22px 22px 14px"><div class="ch"><h3>Equipe cadastrada</h3><span class="tag-soft" id="contagemEq">—</span></div></div>
      <div class="tbl-wrap" style="border:none;border-radius:0"><table>
        <thead><tr><th>Profissional</th><th>Função</th><th>Status</th><th style="text-align:right">Ações</th></tr></thead>
        <tbody id="equipeBody"><tr><td colspan="4" class="loading">Carregando equipe…</td></tr></tbody>
      </table></div>
    </div>
  </div>`;
}

function bindEquipe(){
  document.querySelectorAll("#roles .role-opt").forEach(el=>{
    el.onclick=()=>{papelSel=el.dataset.r;document.querySelectorAll("#roles .role-opt").forEach(x=>x.classList.toggle("on",x===el));};
  });
  carregarEquipe();
}

async function callFnEquipe(payload){
  const r=await fetch(FN_EQUIPE,{method:"POST",headers:{"Authorization":"Bearer "+tokenEq,"apikey":window.MAIS_CONFIG.anonKey,"Content-Type":"application/json"},body:JSON.stringify(payload)});
  return r.json();
}

async function carregarEquipe(){
  const {data,error}=await sb.from("vw_equipe_lista").select("*").order("criado_em");
  const body=document.getElementById("equipeBody"); if(!body)return;
  if(error){body.innerHTML=`<tr><td colspan="4" class="empty">Erro: ${error.message}</td></tr>`;return;}
  const cont=document.getElementById("contagemEq"); if(cont)cont.textContent=`${data.length} pessoa(s)`;
  if(!data.length){body.innerHTML='<tr><td colspan="4" class="empty">Nenhum membro ainda.</td></tr>';return;}
  body.innerHTML=data.map(m=>{
    const eu=m.auth_user_id===meuId;
    return `<tr>
      <td><div class="who"><div class="a" style="background:${corPapel[m.papel]||'#1860A8'}">${ini(m.nome)}</div><div>${m.nome} ${eu?'<span class="tag-me">você</span>':''}<small>${m.email||''}</small></div></div></td>
      <td><span class="pill ${m.papel}">${labelPapel[m.papel]||cap(m.papel)}</span></td>
      <td><span class="stt ${m.ativo?'ok':'pend'}"><span class="d"></span>${m.ativo?'Ativo':'Inativo'}</span></td>
      <td><div class="rowacts">
        <button class="act toggle" ${eu?'disabled':''} onclick="toggleMembro('${m.auth_user_id}',${m.ativo})">${m.ativo?'Inativar':'Reativar'}</button>
        <button class="act del" ${eu?'disabled':''} onclick="pedirExcluirMembro('${m.auth_user_id}','${(m.nome||'').replace(/'/g,"")}')">Excluir</button>
      </div></td></tr>`;
  }).join("");
}

async function criarMembro(){
  const nome=document.getElementById("f_nome").value.trim(), email=document.getElementById("f_email").value.trim();
  const msg=document.getElementById("msgEq");
  function show(t,tipo){msg.textContent=t;msg.className="msg "+tipo;}
  if(!nome||!email){show("Preencha nome e e-mail.","err");return;}
  const btn=document.getElementById("btnCriar"); btn.disabled=true; btn.textContent="Criando...";
  document.getElementById("cred").classList.remove("show");
  try{
    const res=await callFnEquipe({acao:"criar",nome,email,papel:papelSel});
    if(!res.ok){show(res.erro||"Erro ao criar.","err");return;}
    show("Acesso criado para "+nome+".","ok");
    document.getElementById("credSenha").textContent=res.senha_provisoria;
    document.getElementById("cred").classList.add("show");
    document.getElementById("f_nome").value=""; document.getElementById("f_email").value="";
    await carregarEquipe();
  }catch(e){show("Erro: "+(e.message||e),"err");}
  finally{btn.disabled=false;btn.textContent="Criar acesso";}
}
function copiarSenha(){navigator.clipboard.writeText(document.getElementById("credSenha").textContent);}
async function toggleMembro(id,estaAtivo){
  const res=await callFnEquipe({acao:estaAtivo?"inativar":"reativar",auth_user_id:id});
  if(!res.ok){alert(res.erro||"Erro.");return;}
  await carregarEquipe();
}
let alvoExcluir=null;
function pedirExcluirMembro(id,nome){
  alvoExcluir=id;
  document.getElementById("mTit").textContent="Excluir "+nome+"?";
  document.getElementById("mTxt").textContent="O login e o acesso serão removidos definitivamente. Esta ação não pode ser desfeita.";
  document.getElementById("modalEq").classList.add("show");
}
function fecharModalEq(){document.getElementById("modalEq").classList.remove("show");alvoExcluir=null;}
document.addEventListener("DOMContentLoaded",()=>{
  const mok=document.getElementById("mOk");
  if(mok)mok.onclick=async()=>{
    if(!alvoExcluir)return;
    mok.disabled=true;mok.textContent="Excluindo...";
    const res=await callFnEquipe({acao:"excluir",auth_user_id:alvoExcluir});
    mok.disabled=false;mok.textContent="Confirmar";fecharModalEq();
    if(!res.ok){alert(res.erro||"Erro ao excluir.");return;}
    await carregarEquipe();
  };
});

/* ================= NAV ================= */
const SEC={geral:{f:secGeral,t:"Visão geral"},assin:{f:secAssin,t:"Assinantes"},cart:{f:secCart,t:"Cartões"},fin:{f:secFin,t:"Financeiro"},uso:{f:secUso,t:"Uso & Benefícios"},equipe:{f:secEquipe,t:"Equipe"}};
function mostrar(s){
  document.getElementById("content").innerHTML=SEC[s].f();
  document.getElementById("crumbSec").textContent=SEC[s].t;
  document.querySelectorAll("#sbNav button").forEach(b=>b.classList.toggle("on",b.dataset.sec===s));
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("content").scrollTo?.(0,0);
  // re-vincula filtros
  if(s==="assin")document.querySelectorAll("#fltAssin button").forEach(b=>b.onclick=()=>{fltAssinVal=b.dataset.f;document.querySelectorAll("#fltAssin button").forEach(x=>x.classList.toggle("on",x===b));fAssin();});
  if(s==="equipe")bindEquipe();
}

/* cataventos decorativos */
function plantarCv(hostId,n,op){
  const host=document.getElementById(hostId);if(!host)return;host.innerHTML="";const NS="http://www.w3.org/2000/svg";
  const pos=[[8,14,70,11],[78,20,52,9],[40,68,46,13],[88,72,40,8],[20,80,38,10],[60,8,44,12]];
  for(let i=0;i<n;i++){const p=pos[i%pos.length];const s=document.createElementNS(NS,"svg");s.setAttribute("viewBox","-55 -55 110 110");s.setAttribute("width",p[2]);s.setAttribute("height",p[2]);s.classList.add("cv");s.style.left=p[0]+"%";s.style.top=p[1]+"%";s.style.setProperty("--sp",p[3]+"s");s.style.opacity=op;if(i%2)s.style.animationDirection="reverse";const u=document.createElementNS(NS,"use");u.setAttribute("href","#cv-white");s.appendChild(u);host.appendChild(s);}
}

/* ================= BOOT ================= */
(async()=>{
  const eq=await guard();if(!eq)return;
  document.getElementById("uNome").textContent=eq.nome;
  document.getElementById("uRole").textContent=labelPapel[eq.papel]||cap(eq.papel);
  document.getElementById("uAv").textContent=ini(eq.nome);
  // só gestor vê Equipe
  if(eq.papel!=="gestor"){const b=document.querySelector('[data-sec="equipe"]');if(b)b.style.display="none";const g=b?.previousElementSibling;if(g&&g.classList.contains("grp"))g.style.display="none";}
  plantarCv("sbCv",6,.5);
  await carregar();
  // badge de pendências no menu Financeiro
  const venc=D.fat.filter(f=>f.vencida).length;const bg=document.getElementById("bgFin");if(venc>0&&bg){bg.style.display="inline-block";bg.textContent=venc;}
  document.querySelectorAll("#sbNav button").forEach(b=>b.onclick=()=>mostrar(b.dataset.sec));
  mostrar("geral");
})();
</script>
